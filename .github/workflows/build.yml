name: Build for All Platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: arb_inspector_next_linux_x86_64
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact_name: arb_inspector_next_linux_i686
            deps: "gcc-multilib"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: arb_inspector_next_linux_aarch64
            deps: "gcc-aarch64-linux-gnu"
            cc: aarch64-linux-gnu-gcc
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact_name: arb_inspector_next_linux_armv7
            deps: "gcc-arm-linux-gnueabihf"
            cc: arm-linux-gnueabihf-gcc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: arb_inspector_next_windows_x86_64.exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: arb_inspector_next_windows_i686.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux)
        if: runner.os == 'Linux' && matrix.deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Set CC environment variable (Linux cross)
        if: runner.os == 'Linux' && matrix.cc
        run: echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV

      - name: Build release binary (strip symbols)
        env:
          RUSTFLAGS: "-C strip=symbols"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/arb_inspector_next${{ contains(matrix.os, 'windows') && '.exe' || '' }}
